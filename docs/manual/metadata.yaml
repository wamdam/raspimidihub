---
title: "RaspiMIDIHub"
subtitle: "User Manual -- Version 4.0.0"
author: "RaspiMIDIHub Project"
version: "4.0.0"
date: "2026-05-15"
documentclass: report
papersize: a4
fontsize: 10pt
geometry:
  - margin=2.5cm
toc-title: "Contents"
colorlinks: true
linkcolor: accentColour
urlcolor: accentColour
toccolor: black
# Sans-serif body text. DejaVu Sans has comprehensive Unicode
# coverage (≥, ✓, ↔, ←, → etc.) and DejaVu Sans Mono renders the
# box-drawing glyphs in code blocks correctly.
mainfont: "DejaVu Sans"
sansfont: "DejaVu Sans"
monofont: "DejaVu Sans Mono"
monofontoptions:
  - Scale=0.9
# Place figures at the top/bottom of a page, or on a dedicated
# float page. NO `h` (here) — lowercase `h` was too loose and let
# tall portrait screenshots overflow off the page bottom. `tbp` plus
# the section-level FloatBarrier (placeins, loaded in header.tex)
# keeps figures inside their section without ever clipping.
fig-pos: "tbp"
# Layout customisations live in templates/header.tex.
---
