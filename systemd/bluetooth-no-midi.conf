# Drop-in for bluetooth.service: refuse to load BlueZ's `midi` plugin.
#
# The plugin in profiles/midi/midi.c creates an ALSA seq client per
# connected BLE-MIDI device but does NOT forward GATT notifications
# to the seq client (verified on WIDI Master with btmon + aseqdump:
# the radio receives ATT Handle Value Notifications, the seq client
# emits zero events). The "MIDI I/O: Failed to read initial request"
# warning the plugin logs appears to be the symptom — the plugin
# gives up rather than falling back to subscribe-only.
#
# We bridge BLE-MIDI ourselves in raspimidihub.ble_midi_bridge. With
# the plugin off, BlueZ doesn't create a competing-but-broken seq
# client, and we own the GATT subscription end-to-end.
[Service]
ExecStart=
ExecStart=/usr/libexec/bluetooth/bluetoothd -P midi
